<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <a href="index.html">Home</a>
</div>

<div class="chat-container">
    <h2>🤖 Hostel Assistant</h2>

    <div id="chatbox"></div>

    <div class="suggestions">
        <button onclick="quickQuestion('library')">Library</button>
        <button onclick="quickQuestion('mess')">Mess</button>
        <button onclick="quickQuestion('wifi')">WiFi</button>
    </div>

    <input type="text" id="userInput" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
</div>

<script src="script.js"></script>
</body>
</html>
