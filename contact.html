<h2 style="text-align:center;">📩 Raise Support Ticket</h2>

<form onsubmit="return submitForm()" class="contact-form">
    <input type="text" id="name" placeholder="Your Name"><br><br>
    <input type="text" id="issue" placeholder="Describe your issue"><br><br>
    <button type="submit">Submit</button>
</form>

<p id="msg" style="text-align:center;"></p>

<script>
function submitForm() {
    document.getElementById("msg").innerText = "✅ Ticket submitted successfully!";
    return false;
}
</script>

</body>
